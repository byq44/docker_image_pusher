name: Docker

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"
  # 只读查询AK/SK（仅绑定 AliyunContainerRegistryReadOnlyAccess）
  ALIYUN_AK: "${{ secrets.ALIYUN_AK }}"
  ALIYUN_SK: "${{ secrets.ALIYUN_SK }}"

jobs:
  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
      - name: Before freeing up disk space
        run: |
          echo "Before freeing up disk space"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      # 全局前置清理系统垃圾，缓解根分区爆满
      - name: Clean system cache
        run: |
          sudo apt clean
          sudo rm -rf /usr/share/dotnet /opt/ghc
          sudo rm -rf /var/lib/apt/lists/*

      # 扩容Docker磁盘
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 128
          remove-dotnet: 'true'
          remove-haskell: 'true'
          build-mount-path: '/var/lib/docker/'

      - name: Restart docker
        run: sudo service docker restart

      - name: Free up disk space complete
        run: |
          echo "Free up disk space complete"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3

      # 安装阿里云CLI + jq 用于精准解析JSON
      - name: Install Aliyun CLI & jq
        run: |
          sudo apt update && sudo apt install -y jq
          curl -fsSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz | tar xz
          sudo mv aliyun /usr/local/bin/
          aliyun --version || exit 1

          # 自动截取地域
          REGISTRY_FULL="$ALIYUN_REGISTRY"
          ALIYUN_REGION=$(echo "$REGISTRY_FULL" | cut -d '.' -f1)
          echo "自动识别阿里云地域：$ALIYUN_REGION"

          # 配置只读AK/SK
          aliyun configure set \
            --access-key-id $ALIYUN_AK \
            --access-key-secret $ALIYUN_SK \
            --region "$ALIYUN_REGION"

            - name: Sync Images
        run: |
          # 安全登录镜像仓库
          echo "$ALIYUN_REGISTRY_PASSWORD" | docker login "$ALIYUN_REGISTRY" -u "$ALIYUN_REGISTRY_USER" --password-stdin

          # 【工具函数1】解析镜像行，输出四段：plat_prefix repo_prefix img_name img_tag
          function parse_image_line() {
              local line="$1"
              line=$(echo "$line" | xargs) # 去除首尾空格
              local platform=""
              local image_raw=""

              # 分离 --platform 参数
              local arr=($line)
              local i=0
              while [[ $i -lt ${#arr[@]} ]]; do
                if [[ "${arr[$i]}" == "--platform" ]]; then
                  platform="${arr[$((i+1))}"
                  i=$((i+2))
                else
                  image_raw="${arr[$i]}"
                  i=$((i+1))
                fi
              done

              # 去除sha后缀
              image_raw="${image_raw%%@*}"
              image_name_tag=$(echo "$image_raw" | awk -F'/' '{print $NF}')
              name_space=$(echo "$image_raw" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
              img_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
              img_tag=$(echo "$image_name_tag" | awk -F':' '{print $2}')

              # 空命名空间用占位符，保证数组下标不为空
              local repo_prefix=""
              if [[ -n "$name_space" ]]; then
                repo_prefix="${name_space}_"
              else
                repo_prefix="__EMPTY__"
              fi
              # platform前缀
              local plat_prefix=""
              if [[ -n "$platform" ]]; then
                plat_prefix="${platform//\//_}_"
              fi

              echo "$plat_prefix $repo_prefix $img_name $img_tag"
          }

          # 【工具函数2】双层校验：先查仓库，再查Tag
          function check_aliyun_image_exist() {
              local repo_name=$1
              local tag=$2
              set +e
              # 先判断仓库是否存在
              repo_check=$(timeout 10 aliyun cr ListRepo \
                  --Namespace "$ALIYUN_NAME_SPACE" \
                  --RepoName "$repo_name" 2>/dev/null)
              if [[ -z "$repo_check" ]]; then
                set -e
                return 1
              fi
              # 仓库存在再查标签
              local tag_list=$(timeout 10 aliyun cr ListRepoTag \
                  --Namespace "$ALIYUN_NAME_SPACE" \
                  --RepoName "$repo_name" \
                  --PageSize 100 2>/dev/null | jq -r '.Tags[].Tag')
              echo "$tag_list" | grep -xF "$tag" >/dev/null
              local ret=$?
              set -e
              return $ret
          }

          # 预处理：识别重名镜像（下标永远不为空）
          declare -A duplicate_images
          declare -A temp_map
          while IFS= read -r line || [ -n "$line" ]; do
              line=$(echo "$line" | xargs)
              [[ -z "$line" ]] && continue
              if [[ "$line" =~ ^# ]]; then
                  continue
              fi
              read plat_prefix repo_prefix img_name img_tag <<< $(parse_image_line "$line")
              if [[ -n "${temp_map[$img_name]}" ]]; then
                if [[ "${temp_map[$img_name]}" != "$repo_prefix" ]]; then
                  duplicate_images[$img_name]="true"
                fi
              else
                temp_map[$img_name]="$repo_prefix"
              fi
          done < images.txt

          # 正式循环同步镜像
          while IFS= read -r line || [ -n "$line" ]; do
              line=$(echo "$line" | xargs)
              [[ -z "$line" ]] && continue
              if [[ "$line" =~ ^# ]]; then
                  continue
              fi

              read plat_prefix repo_prefix img_name img_tag <<< $(parse_image_line "$line")
              # 占位符替换为空，用于真实API查询与日志展示
              real_repo_prefix="$repo_prefix"
              if [[ "$real_repo_prefix" == "__EMPTY__" ]]; then
                real_repo_prefix=""
              fi
              target_full_name="${plat_prefix}${real_repo_prefix}${img_name}:${img_tag}"
              target_repo="${plat_prefix}${real_repo_prefix}${img_name}"

              echo "DEBUG 查询仓库: $target_repo  Tag: $img_tag"
              if check_aliyun_image_exist "$target_repo" "$img_tag"; then
                  echo "=============================="
                  echo "镜像 $ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$target_full_name 已存在，跳过同步"
                  echo "=============================="
                  continue
              fi

              echo "===== 开始处理镜像：$line ====="
              set +e
              docker pull $line
              pull_exit=$?
              if [ $pull_exit -ne 0 ]; then
                  echo "❌ 镜像【$line】拉取失败，跳过当前镜像，继续下一个"
                  set -e
                  continue
              fi

              target_img="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$target_full_name"
              src_image=$(echo "$line" | awk '{print $NF}' | xargs)
              docker tag "$src_image" "$target_img"

              docker push "$target_img"
              push_exit=$?
              if [ $push_exit -ne 0 ]; then
                  echo "❌ 镜像【$line】推送失败，跳过当前镜像"
                  docker rmi "$src_image" "$target_img" || true
                  set -e
                  continue
              fi
              set -e

              echo "✅ 镜像【$line】同步完成"
              echo "开始清理磁盘空间"
              echo "=============================================================================="
              df -hT
              echo "=============================================================================="
              docker rmi "$src_image" "$target_img" || true
              echo "磁盘空间清理完毕"
              echo "=============================================================================="
              df -hT
              echo "=============================================================================="
          done < images.txt
