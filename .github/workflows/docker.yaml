name: Docker

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"
  # 新增两个密钥，需在仓库Actions Secrets配置
  ALIYUN_AK: "${{ secrets.ALIYUN_AK }}"
  ALIYUN_SK: "${{ secrets.ALIYUN_SK }}"

jobs:
  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
      - name: Before freeing up disk space
        run: |
          echo "Before freeing up disk space"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      # 增加可用磁盘空间
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 128
          remove-dotnet: 'true'
          remove-haskell: 'true'
          # 如果空间还是不够用，可以把以下开启，清理出更多空间
          # remove-android: 'true'
          # remove-codeql: 'true'
          build-mount-path: '/var/lib/docker/'

      - name: Restart docker
        run: sudo service docker restart

      - name: Free up disk space complete
        run: |
          echo "Free up disk space complete"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3

      # 【修复】安装阿里云CLI 稳定二进制包 + 正确截取region
      - name: Install Aliyun CLI
        run: |
          # 二进制安装，避免install.sh脚本失败
          curl -fsSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz | tar xz
          sudo mv aliyun /usr/local/bin/
          aliyun --version

          # 正确截取地域：cn-hangzhou-registry.aliyuncs.com → cn-hangzhou
          REGISTRY_FULL="$ALIYUN_REGISTRY"
          ALIYUN_REGION=$(echo "$REGISTRY_FULL" | cut -d '.' -f1)
          echo "自动识别阿里云地域：$ALIYUN_REGION"

          # 配置AK/SK
          aliyun configure set \
            --access-key-id $ALIYUN_AK \
            --access-key-secret $ALIYUN_SK \
            --region "$ALIYUN_REGION"

      - name: Build and push image Aliyun
        run: |
          docker login -u $ALIYUN_REGISTRY_USER -p $ALIYUN_REGISTRY_PASSWORD $ALIYUN_REGISTRY

          # 【新增函数】查询阿里云镜像是否存在（内部加set容错，查询失败不中断流程）
          function check_aliyun_image_exist() {
              local repo_name=$1
              local tag=$2
              set +e
              aliyun cr ListRepoTag \
                  --RepoNamespace "$ALIYUN_NAME_SPACE" \
                  --RepoName "$repo_name" \
                  --PageSize 100 \
                  | grep -q "\"Tag\":\"$tag\""
              local ret=$?
              set -e
              return $ret
          }

          # 数据预处理,判断镜像是否重名
          declare -A duplicate_images
          declare -A temp_map
          while IFS= read -r line || [ -n "$line" ]; do
              # 忽略空行与注释
              [[ -z "$line" ]] && continue
              if echo "$line" | grep -q '^\s*#'; then
                  continue
              fi
              
              # 获取镜像的完整名称，例如kasmweb/nginx:1.25.3（命名空间/镜像名:版本号）
              image=$(echo "$line" | awk '{print $NF}')
              # 将@sha256:等字符删除
              image="${image%%@*}"
              echo "image $image"
              # 获取镜像名:版本号  例如nginx:1.25.3
              image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
              echo "image_name_tag $image_name_tag"
              # 获取命名空间 例如kasmweb,  这里有种特殊情况 docker.io/nginx，把docker.io当成命名空间，也OK
              name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
              echo "name_space: $name_space"
              # 这里不要是空值影响判断
              name_space="${name_space}_"
              # 获取镜像名例如nginx
              image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
              echo "image_name: $image_name"
              
              # 如果镜像存在于数组中，则添加temp_map
              if [[ -n "${temp_map[$image_name]}" ]]; then
                   # 如果temp_map已经存在镜像名，判断是不是同一命名空间
                   if [[ "${temp_map[$image_name]}" != $name_space  ]]; then
                      echo "duplicate image name: $image_name"
                      duplicate_images[$image_name]="true"
                   fi
              else
                  # 存镜像的命名空间
                  temp_map[$image_name]=$name_space
              fi       
          done < images.txt
          
          
          while IFS= read -r line || [ -n "$line" ]; do
              # 忽略空行与注释
              [[ -z "$line" ]] && continue
              if echo "$line" | grep -q '^\s*#'; then
                  continue
              fi
          
              # -------------------------- 前置判断：阿里云是否已存在镜像 --------------------------
              platform=$(echo "$line" | awk -F'--platform[ =]' '{if (NF>1) print $2}' | awk '{print $1}')
              if [ -z "$platform" ]; then
                  platform_prefix=""
              else
                  platform_prefix="${platform//\//_}_"
              fi
              image=$(echo "$line" | awk '{print $NF}')
              image="${image%%@*}"
              image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
              name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
              image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
              name_space_prefix=""
              if [[ -n "${duplicate_images[$image_name]}" ]]; then
                 if [[ -n "${name_space}" ]]; then
                    name_space_prefix="${name_space}_"
                 fi
              fi
              image_name_tag="${image_name_tag%%@*}"
              # 拼接阿里云目标仓库名+tag
              target_full_name="${platform_prefix}${name_space_prefix}${image_name_tag}"
              target_repo=$(echo "$target_full_name" | awk -F':' '{print $1}')
              target_tag=$(echo "$target_full_name" | awk -F':' '{print $2}')
              
              # 调用函数校验镜像是否已存在阿里云
              if check_aliyun_image_exist "$target_repo" "$target_tag"; then
                  echo "=============================="
                  echo "镜像 $ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$target_full_name 已存在，跳过同步"
                  echo "=============================="
                  continue
              fi
              # --------------------------------------------------------------------------------

              # ========== 容错核心：单镜像失败不中断整体循环 ==========
              set +e
              echo "===== 开始处理镜像：$line ====="
              
              # 拉取镜像
              docker pull $line
              pull_exit=$?
              if [ $pull_exit -ne 0 ]; then
                  echo "❌ 镜像【$line】pull 拉取失败，跳过当前镜像，继续下一个"
                  set -e
                  continue
              fi

              echo "platform is $platform"
              echo "platform_prefix is $platform_prefix"
              new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$platform_prefix$name_space_prefix$image_name_tag"
              echo "docker tag $image $new_image"
              docker tag $image $new_image
              
              # 推送镜像
              docker push $new_image
              push_exit=$?
              if [ $push_exit -ne 0 ]; then
                  echo "❌ 镜像【$line】push 推送失败，跳过当前镜像，继续下一个"
                  docker rmi $image
                  docker rmi $new_image
                  set -e
                  continue
              fi

              echo "✅ 镜像【$line】同步完成"
              echo "开始清理磁盘空间"
              echo "=============================================================================="
              df -hT
              echo "=============================================================================="
              docker rmi $image
              docker rmi $new_image
              echo "磁盘空间清理完毕"
              echo "=============================================================================="
              df -hT
              echo "=============================================================================="
              # 恢复严格报错模式
              set -e
          done < images.txt
